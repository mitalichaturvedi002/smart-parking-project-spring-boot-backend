spring:
  application:
    name: smart_parking_system
  datasource:
    url: jdbc:mysql://localhost:3306/smart-parking?useSSL=false&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver		
  jpa:
